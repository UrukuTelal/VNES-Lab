# CI for VNES-Lab — external verification oracle for ground truth execution.
#
# INVARIANT: CI MUST execute the same entrypoint as local ground truth:
#
#     CI = run(regression_suite.py @ commit SHA)
#
# Not a reimplementation. Not a re-interpretation. The checkout step pins
# to the exact commit being tested; then ci.yml calls the same
# regression_suite.py that any local invocation would. This prevents CI
# divergence drift — the silent failure mode where CI's config drifts away
# from the canonical ground truth logic over time.
#
# CI is NOT a higher truth layer. It is a second independent instantiation
# of the same ground truth computation (regression_suite.py) in an isolated
# environment. It proves reproducibility, not ontological authority.
#
# Every blocked / fixed / pending / regression label must be traceable to
# regression_suite.py or status.py (derived from suite). CI independently
# verifies that derivation. If CI passes, the suite output is validated.
# If CI fails, suite output is suspect — but CI itself can be stale,
# misconfigured, or environment-affected.

name: VNES-Lab Regression Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for baseline provenance (git commit)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Verify invariant — CI = run(regression_suite.py @ commit SHA)
        run: |
          echo "Commit: ${{ github.sha }}"
          sha256sum regressions/regression_suite.py
          echo "Invariant satisfied: CI will execute the same regression_suite.py as local ground truth"

      - name: Install dependencies
        run: |
          pip install numpy matplotlib
          echo "Dependencies installed (exit $?)"

      - name: Run regression suite (ground truth)
        run: |
          python regressions/regression_suite.py --json ci_report.json

      - name: Derive project status
        run: |
          python regressions/status.py
          python regressions/status.py --json

      - name: Archive CI report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-report
          path: ci_report.json

      - name: Assert zero regressions
        run: |
          python -c "
          import json
          r = json.load(open('ci_report.json'))
          s = r['summary']
          verdict = s.get('verdict', 'FAIL')
          print(f'Verdict: {verdict}')
          print(f'{s[\"passed\"]}/{s[\"total\"]} passed, {s[\"failed\"]} failed, {s[\"error\"]} errors')
          assert verdict == 'PASS', f'CI REJECTED: {s[\"failed\"]} regressions detected'
          print('CI ACCEPTED: all status claims are authoritative')
          "

  rlaaer-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: regression-suite  # run after regression suite passes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r dev-requirements.txt

      - name: Run R-LAAER tests
        run: |
          python -m pytest rlaaer/tests/ -v --tb=short

      - name: Validate all spec.yamls
        run: |
          python -c "
          import glob, sys
          from rlaaer.validation import validate_spec
          errors = []
          for f in glob.glob('experiments/*/spec.yaml'):
              ok, msg = validate_spec(f)
              if not ok:
                  errors.append(f'{f}: {msg}')
          if errors:
              for e in errors:
                  print(f'VALIDATION ERROR: {e}')
              sys.exit(1)
          print(f'All {len(glob.glob(\"experiments/*/spec.yaml\"))} spec.yamls valid')
          "
